<div class="p-6 font-sans">
  <h2 class="text-2xl font-bold mb-1">Dashboard</h2>
  <p class="text-gray-500 mb-4">Showing widgets loaded asynchronously via Service</p>
  <hr class="mb-6 border-gray-200" />

  @if (widgets$ | async; as widgets) {
  <div class="flex flex-wrap gap-4">
    @for (widget of widgets; track widget.id) {
    <div class="border border-gray-200 rounded-lg p-4 min-w-60 flex-1">
      <h3 class="text-sm font-semibold text-gray-700 mb-2">{{ widget.title }}</h3>
      <ng-container *ngComponentOutlet="widget.component"></ng-container>
    </div>
    }
  </div>
  } @else {
  <div class="text-gray-500 animate-pulse">Loading your dashboard from backend...</div>
  }
</div>
